$kind: http-request
name: Register User
method: POST
url: '{{baseUrl}}/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "username": "johndoe",
      "password": "Password123",
      "full_name": "John Doe"
    }
