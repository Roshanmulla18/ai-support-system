$kind: http-request
name: Update Current User
method: PUT
url: '{{baseUrl}}/users/me'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "newemail@example.com",
      "full_name": "John Updated"
    }
