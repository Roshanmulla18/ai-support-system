$kind: http-request
name: Update Ticket
method: PUT
url: '{{baseUrl}}/tickets/{{ticketId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated title",
      "status": "in_progress",
      "priority": "medium"
    }
